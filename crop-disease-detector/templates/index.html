<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Disease Detector 🌿</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center text-success">Crop Disease Detector 🌿</h2>
        <p class="text-center text-muted">Upload your leaf image or capture using mobile camera.</p>

        <form action="/predict" method="POST" enctype="multipart/form-data" class="mt-4 text-center">
            <input type="file" name="file" accept="image/*" capture="camera" class="form-control mb-3">
            <button type="submit" class="btn btn-success btn-lg">Predict</button>
        </form>
    </div>
</body>

</html>
